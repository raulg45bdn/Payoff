name: Build iOS IPA

on:
  workflow_dispatch: # manual trigger button on GitHub
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Patch expo-file-system — fix missing ExpoAppDelegate
        run: |
          python3 - <<'PYEOF'
          filepath = 'node_modules/expo-file-system/ios/FileSystemModule.swift'
          with open(filepath, 'r') as f:
              content = f.read()
          content = content.replace(
              'ExpoAppDelegate.getSubscriberOfType(FileSystemBackgroundSessionHandler.self)',
              'nil'
          )
          with open(filepath, 'w') as f:
              f.write(content)
          print('Patched FileSystemModule.swift OK')
          PYEOF

      - name: Expo prebuild (generate ios/ folder, skip pod install)
        run: npx expo prebuild --platform ios --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Show and patch AppDelegate.swift
        run: |
          python3 - <<'PYEOF'
          with open('ios/PayOff/AppDelegate.swift', 'r') as f:
              content = f.read()
          print('=== AppDelegate.swift (before patch) ===')
          print(content)
          print('=== end ===')
          # ExpoAppDelegate lives in the Expo Swift module, not ExpoModulesCore.
          # Ensure it is importable from the app target.
          if 'import Expo\n' not in content and 'ExpoAppDelegate' in content:
              content = 'import Expo\n' + content
              with open('ios/PayOff/AppDelegate.swift', 'w') as f:
                  f.write(content)
              print('Patched AppDelegate.swift: prepended import Expo')
          else:
              print('AppDelegate.swift needs no import patch')
          PYEOF

      - name: Patch Podfile — inject Swift 5 into existing post_install
        run: |
          python3 - <<'PYEOF'
          with open('ios/Podfile', 'r') as f:
              lines = f.readlines()

          result = []
          for line in lines:
              result.append(line)
              if 'post_install do |installer|' in line:
                  result += [
                      '    installer.pods_project.targets.each do |target|\n',
                      '      target.build_configurations.each do |config|\n',
                      "        config.build_settings['SWIFT_VERSION'] = '5.0'\n",
                      "        config.build_settings['SWIFT_STRICT_CONCURRENCY'] = 'minimal'\n",
                      '      end\n',
                      '    end\n',
                  ]

          with open('ios/Podfile', 'w') as f:
              f.writelines(result)
          print('Podfile patched OK')
          PYEOF

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: pod install --project-directory=ios

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Build iOS archive (unsigned)
        run: |
          set -o pipefail && xcodebuild archive \
            -workspace ios/PayOff.xcworkspace \
            -scheme PayOff \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/PayOff.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_VERSION=5.0 \
            SWIFT_STRICT_CONCURRENCY=minimal \
            2>&1 | tee /tmp/xcodebuild.log | xcpretty

      - name: Show raw errors on failure
        if: failure()
        run: |
          echo "=== Raw xcodebuild errors ==="
          grep ": error:" /tmp/xcodebuild.log | head -50 || echo "(no error lines found)"

      - name: Package into IPA
        run: |
          mkdir -p Payload
          cp -r "$RUNNER_TEMP/PayOff.xcarchive/Products/Applications/PayOff.app" Payload/
          zip -r PayOff.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PayOff-iOS
          path: PayOff.ipa
          retention-days: 30
