name: Build iOS IPA

on:
  workflow_dispatch: # manual trigger button on GitHub
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Expo prebuild (generate ios/ folder)
        run: npx expo prebuild --platform ios --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        run: pod install --project-directory=ios

      - name: Build iOS archive (unsigned)
        run: |
          xcodebuild archive \
            -workspace ios/PayOff.xcworkspace \
            -scheme PayOff \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/PayOff.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_VERSION=5 \
            SWIFT_STRICT_CONCURRENCY=minimal

      - name: Package into IPA
        run: |
          mkdir -p Payload
          cp -r "$RUNNER_TEMP/PayOff.xcarchive/Products/Applications/PayOff.app" Payload/
          zip -r PayOff.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PayOff-iOS
          path: PayOff.ipa
          retention-days: 30
